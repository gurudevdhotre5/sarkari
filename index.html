<!DOCTYPE html>
<html>
<head>
<title>सरकारी लिंक</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:Arial;background:#f2f2f2;}

header{
background:#0d3b66;
color:white;
text-align:center;
padding:25px;
position:relative;
}

header h1{
margin:0;
font-size:36px;
}

.menu-dot{
position:absolute;
right:20px;
top:20px;
font-size:24px;
cursor:pointer;
}

.nav{
background:black;
text-align:center;
padding:10px;
}

.nav a{
color:white;
padding:10px 15px;
text-decoration:none;
display:inline-block;
}

.nav a:hover{
background:#0044cc;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.box{
background:white;
width:320px;
border-radius:8px;
box-shadow:0 0 10px #ccc;
overflow:hidden;
}

.box h3{
margin:0;
padding:10px;
background:#c40000;
color:white;
text-align:center;
}

.box ul{
list-style:none;
padding:10px;
margin:0;
}

.box ul li{
padding:8px;
border-bottom:1px solid #ddd;
}

.box ul li a{
text-decoration:none;
color:#0d3b66;
font-weight:bold;
}

.hidden{display:none;}

.admin-panel{
position:fixed;
top:5%;
left:50%;
transform:translateX(-50%);
background:white;
width:400px;
padding:20px;
box-shadow:0 0 15px gray;
border-radius:8px;
z-index:1000;
}

.admin-panel input, select{
width:100%;
padding:8px;
margin:8px 0;
}

.admin-panel button{
padding:8px 12px;
margin:5px 0;
background:#0d3b66;
color:white;
border:none;
cursor:pointer;
}

.admin-panel button:hover{
background:#002855;
}

.admin-list{
max-height:200px;
overflow:auto;
margin-top:10px;
border-top:1px solid #ccc;
padding-top:10px;
}
</style>
</head>

<body>

<header>
<h1>सरकारी लिंक</h1>
<div class="menu-dot" onclick="showLogin()">⋮</div>
</header>

<div class="nav">
<a href="#">होम</a>
<a href="#">नौकरी</a>
<a href="#">एडमिट कार्ड</a>
<a href="#">रिजल्ट</a>
<a href="#">एडमिशन</a>
</div>

<div class="container">

<div class="box">
<h3>सरकारी काम</h3>
<ul id="govt"></ul>
</div>

<div class="box">
<h3>मोबाइल से संबंधित</h3>
<ul id="mobile"></ul>
</div>

<div class="box">
<h3>चुनाव</h3>
<ul id="election"></ul>
</div>

</div>

<!-- Login -->
<div id="loginBox" class="admin-panel hidden">
<h3>Admin Login</h3>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="msg" style="color:red;"></p>
</div>

<!-- Admin Dashboard -->
<div id="adminPanel" class="admin-panel hidden">
<h3>Admin Dashboard</h3>

<select id="category">
<option value="govt">सरकारी काम</option>
<option value="mobile">मोबाइल</option>
<option value="election">चुनाव</option>
</select>

<input type="text" id="title" placeholder="Title">
<input type="text" id="url" placeholder="URL (https://...)">

<button onclick="addData()">Add</button>
<button onclick="logout()">Logout</button>

<div class="admin-list" id="adminList"></div>

</div>

<script>
let user="admin";
let pass="1234";

function showLogin(){
document.getElementById("loginBox").classList.remove("hidden");
}

function login(){
let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

if(u===user && p===pass){
document.getElementById("loginBox").classList.add("hidden");
document.getElementById("adminPanel").classList.remove("hidden");
loadAll();
}else{
document.getElementById("msg").innerText="Wrong Login!";
}
}

function logout(){
document.getElementById("adminPanel").classList.add("hidden");
}

function addData(){
let cat=document.getElementById("category").value;
let title=document.getElementById("title").value;
let url=document.getElementById("url").value;

if(title==="" || url==="") return;

let data=JSON.parse(localStorage.getItem("data"))||[];
data.push({cat,title,url});
localStorage.setItem("data",JSON.stringify(data));

document.getElementById("title").value="";
document.getElementById("url").value="";
loadAll();
}

function loadAll(){
let data=JSON.parse(localStorage.getItem("data"))||[];

document.getElementById("govt").innerHTML="";
document.getElementById("mobile").innerHTML="";
document.getElementById("election").innerHTML="";
document.getElementById("adminList").innerHTML="";

data.forEach((item,index)=>{
document.getElementById(item.cat).innerHTML+=
`<li><a href="${item.url}" target="_blank">${item.title}</a></li>`;

document.getElementById("adminList").innerHTML+=
`${item.title} 
<button onclick="deleteData(${index})">Delete</button><br>`;
});
}

function deleteData(index){
let data=JSON.parse(localStorage.getItem("data"))||[];
data.splice(index,1);
localStorage.setItem("data",JSON.stringify(data));
loadAll();
}

loadAll();
</script>

</body>
</html>
