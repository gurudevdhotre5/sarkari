<!DOCTYPE html>
<html>
<head>
<title>Admin Notification Panel</title>
<style>
body {font-family: Arial; margin:0; background:#f2f2f2;}
header {background:#007bff; color:white; padding:15px; text-align:center;}
.container {padding:20px;}
input, button {padding:8px; margin:5px;}
button {background:#007bff; color:white; border:none; cursor:pointer;}
button:hover {background:#0056b3;}
.notification {background:white; padding:10px; margin:10px 0; border-radius:5px;}
.hidden {display:none;}
</style>
</head>
<body>

<header>
<h2>CSC Admin Panel</h2>
</header>

<div class="container" id="loginPage">
<h3>Login</h3>
<input type="text" id="username" placeholder="Username"><br>
<input type="password" id="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
<p id="loginMsg" style="color:red;"></p>
</div>

<div class="container hidden" id="adminPanel">
<h3>Add Notification</h3>
<input type="text" id="newNotification" placeholder="Enter notification">
<button onclick="addNotification()">Add</button>
<button onclick="logout()">Logout</button>

<h3>All Notifications</h3>
<div id="notificationList"></div>
</div>

<script>
let correctUser = "admin";
let correctPass = "1234";

function login(){
let user = document.getElementById("username").value;
let pass = document.getElementById("password").value;

if(user === correctUser && pass === correctPass){
document.getElementById("loginPage").classList.add("hidden");
document.getElementById("adminPanel").classList.remove("hidden");
loadNotifications();
}else{
document.getElementById("loginMsg").innerText="Wrong Username or Password";
}
}

function logout(){
location.reload();
}

function addNotification(){
let text = document.getElementById("newNotification").value;
if(text === "") return;

let notifications = JSON.parse(localStorage.getItem("notifications")) || [];
notifications.push(text);
localStorage.setItem("notifications", JSON.stringify(notifications));
document.getElementById("newNotification").value="";
loadNotifications();
}

function loadNotifications(){
let notifications = JSON.parse(localStorage.getItem("notifications")) || [];
let list = document.getElementById("notificationList");
list.innerHTML="";
notifications.forEach((item, index)=>{
list.innerHTML += `<div class="notification">
${item}
<button onclick="deleteNotification(${index})">Delete</button>
</div>`;
});
}

function deleteNotification(index){
let notifications = JSON.parse(localStorage.getItem("notifications")) || [];
notifications.splice(index,1);
localStorage.setItem("notifications", JSON.stringify(notifications));
loadNotifications();
}
</script>

</body>
</html>
