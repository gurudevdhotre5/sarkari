<!DOCTYPE html>
<html>
<head>
<title>Sarkari Result & CSC Portal</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<style>
body{font-family:Arial;background:#f4f4f4;padding:20px}
.card{background:white;padding:10px;margin:10px 0}
button{padding:6px 12px}
</style>
</head>
<body>

<h1>Sarkari Result & CSC Portal</h1>

<h2>Notifications</h2>
<div id="data"></div>

<hr>

<h2>Admin Login</h2>
<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="pass" placeholder="Password"><br><br>
<button onclick="login()">Login</button>

<div id="admin" style="display:none;">
<h3>Add Notification</h3>
<input type="text" id="title" placeholder="Notification Title"><br><br>
<button onclick="addData()">Add</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function login(){
let email = document.getElementById("email").value;
let pass = document.getElementById("pass").value;

auth.signInWithEmailAndPassword(email,pass)
.then(()=>{
document.getElementById("admin").style.display="block";
alert("Login Success");
})
.catch(()=>alert("Login Failed"));
}

function addData(){
let title = document.getElementById("title").value;
db.collection("notifications").add({title:title});
alert("Added");
loadData();
}

function loadData(){
db.collection("notifications").onSnapshot((snapshot)=>{
let html="";
snapshot.forEach(doc=>{
html += `<div class="card">${doc.data().title}</div>`;
});
document.getElementById("data").innerHTML=html;
});
}

loadData();
</script>

</body>
</html>
